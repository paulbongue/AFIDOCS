# ===========================================================================
#  AFI-DOCS — Configuration Nginx (frontend React + API Laravel, meme domaine)
#  Copier dans : /etc/nginx/sites-available/afidocs
#  Activer :     ln -s /etc/nginx/sites-available/afidocs /etc/nginx/sites-enabled/
#  Tester :      nginx -t   puis   systemctl reload nginx
#  Remplacer afidocs.duckdns.org par TON domaine.
#  (Le bloc HTTPS sera ajoute automatiquement par certbot.)
# ===========================================================================
server {
    listen 80;
    server_name afidocs.duckdns.org;

    # Frontend React (build Vite) servi a la racine.
    root /var/www/afidocs/web/dist;
    index index.html;

    # Taille max des fichiers uploades (cours) : 60 Mo.
    client_max_body_size 60M;

    # --- API + fichiers + health : geres par Laravel (PHP-FPM) ---
    location ~ ^/(api|storage|up) {
        root /var/www/afidocs/backend/public;
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        root /var/www/afidocs/backend/public;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
    }

    # --- SPA React : tout le reste retombe sur index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache des assets statiques du frontend.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        access_log off;
    }
}
